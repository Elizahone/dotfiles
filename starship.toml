format = '''
[╭─](bold blue) $hostname$os $directory $fill$python$git_branch$shell
[╰─>](bold blue) '''


[hostname]
ssh_only = false
format = '[$hostname](bold red) '
disabled = false

[os]
format = '$symbol'
style = "bold blue"
disabled = false
[os.symbols]
Windows = " "
Arch = "[ ](blue)"
FreeBSD = "[󰱯 ](red)"

[python]
symbol = ''
pyenv_version_name = true
format = ' [${symbol} (\($virtualenv\) )]($style)'


[shell]
fish_indicator = '󰈺 '
powershell_indicator = '_'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = false

[fill]
symbol = ' '

[directory]
truncation_length = 12
truncation_symbol = '…/'
read_only = "  "
